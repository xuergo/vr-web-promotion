    <div class="flex flex-col items-center justify-center w-full h-screen" onclick="toggleLang()">
        <h1 class="text-6xl font-bold text-white mt-12">
            <span class="text-pink-500" data-zh="本地资源？" data-en="Local Files?">本地资源？</span>
            <span data-zh=" 网址？" data-en=" URLs?"> 网址？</span>
        </h1>
        <h1 class="text-3xl text-white mt-8">
            <span data-zh="依旧 " data-en="Still ">依旧 </span>
            <span class="text-pink-500" data-zh="胜任" data-en="Got It">胜任</span>
        </h1>
        <img class="mt-auto" width="1000" src="assets/xc3.png" alt="logo">
    </div>

    <script>
        let isEn = false;

        function toggleLang() {
            isEn = !isEn;
            const btn = document.getElementById('lang-btn');
            btn.textContent = isEn ? '中文' : 'EN';
            document.querySelectorAll('[data-zh]').forEach(el => {
                el.textContent = isEn ? el.dataset.en : el.dataset.zh;
            });
        }
    </script>
